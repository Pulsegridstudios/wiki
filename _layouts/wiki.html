<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <link rel="stylesheet" href="{{ '/assets/css/custom.css' | relative_url }}">
</head>
<body>

<div class="site-shell">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-inner">

      <!-- BRAND -->
      <a class="site-brand" href="{{ '/' | relative_url }}">
        {% if site.logo %}
          <img src="{{ site.logo | relative_url }}" class="site-logo">
        {% endif %}
        <div>
          <div class="site-title">{{ site.title }}</div>
          <div class="site-tagline">{{ site.description }}</div>
        </div>
      </a>

      <!-- NAV -->
      <nav class="sidebar-nav">

        <details class="nav-group" open>
          <summary>General</summary>
          <div class="nav-group-links">
            <a href="{{ '/' | relative_url }}" {% if page.url == '/' %}aria-current="page"{% endif %}>Home</a>
            <a href="{{ '/pages/control-room-basics/' | relative_url }}" {% if page.url contains '/control-room-basics' %}aria-current="page"{% endif %}>Control Room Basics</a>
          </div>
        </details>

        <details class="nav-group" open>
          <summary>Guides</summary>
          <div class="nav-group-links">
            <a href="{{ '/pages/startup/' | relative_url }}" {% if page.url contains '/startup' %}aria-current="page"{% endif %}>Startup Guide</a>
          </div>
        </details>

        <details class="nav-group" open>
          <summary>Emergency Procedures</summary>
          <div class="nav-group-links">
            <a href="{{ '/pages/scram/' | relative_url }}" {% if page.url contains '/scram' %}aria-current="page"{% endif %}>SCRAM Guide</a>
          </div>
        </details>

      </nav>

      <!-- FOOTER -->
      <div class="sidebar-footer">

        {% for link in site.aux_links %}
          <a href="{{ link[1] }}" target="_blank">{{ link[0] }}</a>
        {% endfor %}

        <!-- THEME BUTTON -->
        <button id="theme-toggle" class="theme-toggle">🌙</button>

      </div>

    </div>
  </aside>

  <!-- MAIN -->
  <main class="main-content">
    <div class="content-wrap">

      {% if page.title %}
      <header class="page-header">
        <h1>{{ page.title }}</h1>
      </header>
      {% endif %}

      <article class="page-content">
        {{ content }}
      </article>

    </div>
  </main>

</div>

<!-- THEME SCRIPT -->
<script>
(function () {
  const saved = localStorage.getItem("theme");
  if (saved === "light") {
    document.documentElement.setAttribute("data-theme", "light");
  }
})();

document.addEventListener("DOMContentLoaded", () => {
  const btn = document.getElementById("theme-toggle");

  function update() {
    const light = document.documentElement.getAttribute("data-theme") === "light";
    btn.textContent = light ? "🌙" : "☀️";
  }

  btn.addEventListener("click", () => {
    const light = document.documentElement.getAttribute("data-theme") === "light";

    if (light) {
      document.documentElement.removeAttribute("data-theme");
      localStorage.setItem("theme", "dark");
    } else {
      document.documentElement.setAttribute("data-theme", "light");
      localStorage.setItem("theme", "light");
    }

    update();
  });

  update();
});
</script>

</body>
</html>
